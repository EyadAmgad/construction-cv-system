services:
  postgres:
    image: postgres:16-alpine
    container_name: construction_cv_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/services/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: construction_cv_kafka
    restart: unless-stopped
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: construction_cv_pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  api:
    build: .
    container_name: construction_cv_api
    restart: unless-stopped
    command: ["uvicorn", "src.backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_BOOTSTRAP=kafka:9092
    volumes:
      - ./src:/app/src
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy

  consumer:
    build: .
    container_name: construction_cv_consumer
    restart: unless-stopped
    command: ["python", "src/services/kafka_consumer.py"]
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_BOOTSTRAP=kafka:9092
    volumes:
      - ./src:/app/src
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  kafka_data:

